<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Level Isometric Grid Canvas</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: rgba(22, 27, 34, 0.95);
            border-bottom: 2px solid #00ffcc;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.15);
        }
        h1 {
            font-size: 14px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .stats {
            font-size: 11px;
            color: #8b949e;
        }
        .main-container {
            display: flex;
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #151b22 0%, #0d1117 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .control-panel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .control-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            font-weight: bold;
            min-width: 80px;
        }
        .btn {
            background: #1f242c;
            border: 1px solid rgba(0, 255, 204, 0.4);
            color: #c9d1d9;
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .btn:hover {
            background: #00ffcc;
            color: #0d1117;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }
        .btn.active {
            background: #00ffcc;
            color: #0d1117;
            border-color: #00ffcc;
            font-weight: bold;
        }
        .btn-danger {
            border-color: rgba(255, 51, 102, 0.4);
        }
        .btn-danger:hover {
            background: #ff3366;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.4);
        }
        .tool-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(22, 27, 34, 0.85);
            border: 1px solid #ff3366;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 10px;
            color: #ff3366;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .legend {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(22, 27, 34, 0.85);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 10px;
            color: #8b949e;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 30px);
            grid-template-rows: repeat(3, 30px);
            gap: 4px;
            align-self: flex-end;
        }
        .dpad-btn {
            background: #1f242c;
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 4px;
            color: #00ffcc;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dpad-btn:active {
            background: #00ffcc;
            color: #0d1117;
        }
        .dpad-empty {
            visibility: hidden;
        }
        .flex-spacer {
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>ISO-GRID-V1 // HTML5 CANVAS ENGINE</h1>
            <div class="stats" id="info-bar">GRID: 8x8 // Z-LAYERS: 4 // ACTIVE LAYER: Z=1</div>
        </div>
        <button class="btn" onclick="randomizeGrid()">AUTO-GEN MAP</button>
    </header>

    <div class="main-container">
        <!-- Legend Overlay -->
        <div class="legend">
            <div style="color: #00ffcc; font-weight: bold; margin-bottom: 2px; border-bottom: 1px solid rgba(0,255,204,0.1); padding-bottom: 2px;">GRID CODES</div>
            <div class="legend-item"><div class="legend-color" style="background: #112222;"></div> Z=0 SEWER ROAD</div>
            <div class="legend-item"><div class="legend-color" style="background: #1a1f29;"></div> Z=1 HIGHWAY GRID</div>
            <div class="legend-item"><div class="legend-color" style="background: #2a1f2d;"></div> Z=2 MEZZ PLATFORM</div>
            <div class="legend-item"><div class="legend-color" style="background: #10ffcc;"></div> TERMINAL</div>
            <div class="legend-item"><div class="legend-color" style="background: #ff3366;"></div> PLASMA CORE (HURTS)</div>
            <div class="legend-item"><div class="legend-color" style="background: #ff9900;"></div> BARREL</div>
            <div class="legend-item"><div class="legend-color" style="background: #334455;"></div> STRUCTURAL WALL</div>
        </div>

        <!-- Tool & Cursor Info Indicator -->
        <div class="tool-indicator" id="cursor-indicator">
            <div>CURSOR: OUT OF GRID</div>
            <div>LAYER: Z=1 (MAIN)</div>
            <div>SELECTION: BLOCK_ADD</div>
        </div>

        <canvas id="isoCanvas"></canvas>

        <!-- Controls UI panel overlay -->
        <div class="control-panel">
            <div class="control-row">
                <span class="control-label">LAYERS</span>
                <button class="btn" id="lay-all" onclick="setViewMode('ALL')">ALL (TRANSLUCENT)</button>
                <button class="btn active" id="lay-iso" onclick="setViewMode('ISOLATED')">CURRENT LAYER ONLY</button>
                <button class="btn" id="lay-wire" onclick="setViewMode('WIREFRAME')">WIREFRAME MODE</button>
            </div>
            <div class="control-row">
                <span class="control-label">Z-LEVEL</span>
                <button class="btn" id="z-0" onclick="setZLevel(0)">Z0 (SEWER)</button>
                <button class="btn active" id="z-1" onclick="setZLevel(1)">Z1 (MAIN STREET)</button>
                <button class="btn" id="z-2" onclick="setZLevel(2)">Z2 (MEZZANINE)</button>
                <button class="btn" id="z-3" onclick="setZLevel(3)">Z3 (ROOFTOP)</button>
            </div>
            <div class="control-row">
                <span class="control-label">BRUSH</span>
                <button class="btn active" id="b-road" onclick="setBrush('ROAD')">ROAD TILE</button>
                <button class="btn" id="b-wall" onclick="setBrush('WALL')">WALL BLOCK</button>
                <button class="btn" id="b-laser" onclick="setBrush('LASER')">LASER CORE</button>
                <button class="btn" id="b-barrel" onclick="setBrush('BARREL')">BARREL</button>
                <button class="btn" id="b-term" onclick="setBrush('TERMINAL')">TERMINAL</button>
                <button class="btn btn-danger" onclick="clearActiveLayer()">CLEAR LEVEL</button>

                <div class="flex-spacer"></div>

                <!-- D-Pad for Touch/Emulator navigation support -->
                <span class="control-label" style="min-width: unset;">DRONE CONTROLS</span>
                <div class="dpad">
                    <button class="dpad-btn" onclick="moveDrone(0, -1)">▲</button>
                    <button class="dpad-btn dpad-empty"></button>
                    <button class="dpad-btn" onclick="moveDrone(-1, 0)">◀</button>
                    <button class="dpad-btn dpad-empty"></button>
                    <button class="dpad-btn" onclick="moveDrone(1, 0)">▶</button>
                    <button class="dpad-btn dpad-empty"></button>
                    <button class="dpad-btn" onclick="moveDrone(0, 1)">▼</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("isoCanvas");
        const ctx = canvas.getContext("2d");

        // Isometric viewport params
        let tileWidth = 64;
        let tileHeight = 32;
        let zHeightOffset = 28; // visual height offset for stack elevations
        let gridCols = 8;
        let gridRows = 8;
        let activeZ = 1;
        let viewMode = 'ISOLATED'; // 'ALL' | 'ISOLATED' | 'WIREFRAME'
        let currentBrush = 'ROAD'; // 'ROAD' | 'WALL' | 'LASER' | 'BARREL' | 'TERMINAL'

        // Pan offsets
        let panX = 0;
        let panY = -30;

        // Tile types mapping
        const TileType = {
            EMPTY: 0,
            GRID_ROAD: 1,
            WALL: 2,
            LASER: 3,
            BARREL: 4,
            TERMINAL: 5
        };

        // Drone Character Position
        let drone = {
            x: 3.5,
            y: 3.5,
            z: 1.0,
            color: '#00ffff'
        };

        // Complete 3D Grid Map [z][x][y]
        // Initialize 4 layers of 8x8 grids
        let mapData = [];
        for (let z = 0; z < 4; z++) {
            mapData[z] = [];
            for (let x = 0; x < gridCols; x++) {
                mapData[z][x] = [];
                for (let y = 0; y < gridRows; y++) {
                    // Default road on Z1 and Z0, empty elsewhere
                    if (z === 1 && (x === 3 || y === 4)) {
                        mapData[z][x][y] = TileType.GRID_ROAD;
                    } else if (z === 0 && (x === 1 || y === 6)) {
                        mapData[z][x][y] = TileType.GRID_ROAD;
                    } else {
                        mapData[z][x][y] = TileType.EMPTY;
                    }
                }
            }
        }

        // Prepopulate with nice isometric layout elements
        mapData[1][3][3] = TileType.TERMINAL;
        mapData[1][5][2] = TileType.WALL;
        mapData[1][5][3] = TileType.WALL;
        mapData[1][2][5] = TileType.BARREL;
        mapData[1][0][4] = TileType.LASER;

        mapData[2][3][4] = TileType.GRID_ROAD;
        mapData[2][4][4] = TileType.GRID_ROAD;
        mapData[2][4][5] = TileType.WALL;

        // Resize handler
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            draw();
        }
        window.addEventListener("resize", resizeCanvas);

        // Grid Isometric coordinates conversion
        function toIso(x, y, z) {
            const screenX = canvas.width / 2 + (x - y) * (tileWidth / 2) + panX;
            const screenY = canvas.height / 2 + (x + y) * (tileHeight / 2) - z * zHeightOffset + panY;
            return { x: screenX, y: screenY };
        }

        function toGrid(screenX, screenY) {
            // Un-offset pan
            const sx = screenX - canvas.width / 2 - panX;
            const sy = screenY - canvas.height / 2 - panY + activeZ * zHeightOffset;

            // Solve isometric projections system of equations
            // sx = (x - y) * (tileWidth / 2)
            // sy = (x + y) * (tileHeight / 2)
            const isoX = (sx / (tileWidth / 2) + sy / (tileHeight / 2)) / 2;
            const isoY = (sy / (tileHeight / 2) - sx / (tileWidth / 2)) / 2;

            return {
                x: Math.floor(isoX),
                y: Math.floor(isoY)
            };
        }

        // Setup interaction
        let hoverGrid = { x: -1, y: -1 };

        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const grid = toGrid(mouseX, mouseY);
            if (grid.x >= 0 && grid.x < gridCols && grid.y >= 0 && grid.y < gridRows) {
                hoverGrid = grid;
                document.getElementById("cursor-indicator").innerHTML = `
                    CURSOR: (${grid.x}, ${grid.y})<br>
                    LAYER: Z=${activeZ}<br>
                    BRUSH: ${currentBrush}
                `;
            } else {
                hoverGrid = { x: -1, y: -1 };
                document.getElementById("cursor-indicator").innerHTML = `
                    CURSOR: OUT OF GRID<br>
                    LAYER: Z=${activeZ}<br>
                    BRUSH: ${currentBrush}
                `;
            }
            draw();
        });

        canvas.addEventListener("click", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const grid = toGrid(mouseX, mouseY);
            if (grid.x >= 0 && grid.x < gridCols && grid.y >= 0 && grid.y < gridRows) {
                const currentType = mapData[activeZ][grid.x][grid.y];
                const targetType = getBrushType();

                if (currentType === targetType) {
                    // Toggle erase
                    mapData[activeZ][grid.x][grid.y] = TileType.EMPTY;
                } else {
                    mapData[activeZ][grid.x][grid.y] = targetType;
                }
                draw();
            }
        });

        // Brush mappings
        function getBrushType() {
            switch(currentBrush) {
                case 'ROAD': return TileType.GRID_ROAD;
                case 'WALL': return TileType.WALL;
                case 'LASER': return TileType.LASER;
                case 'BARREL': return TileType.BARREL;
                case 'TERMINAL': return TileType.TERMINAL;
                default: return TileType.GRID_ROAD;
            }
        }

        function setBrush(brush) {
            currentBrush = brush;
            const buttons = ["b-road", "b-wall", "b-laser", "b-barrel", "b-term"];
            buttons.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.classList.remove("active");
            });

            const activeBtn = document.getElementById(`b-${brush.toLowerCase().substring(0,4)}`);
            if (activeBtn) activeBtn.classList.add("active");
            draw();
        }

        function setZLevel(level) {
            activeZ = level;
            for (let i = 0; i < 4; i++) {
                document.getElementById(`z-${i}`).classList.remove("active");
            }
            document.getElementById(`z-${level}`).classList.add("active");
            document.getElementById("info-bar").innerText = `GRID: 8x8 // Z-LAYERS: 4 // ACTIVE LAYER: Z=${level}`;
            
            // Adjust character Z as well so they drop down/fly up
            drone.z = level;

            draw();
        }

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById("lay-all").classList.remove("active");
            document.getElementById("lay-iso").classList.remove("active");
            document.getElementById("lay-wire").classList.remove("active");

            if (mode === 'ALL') document.getElementById("lay-all").classList.add("active");
            if (mode === 'ISOLATED') document.getElementById("lay-iso").classList.add("active");
            if (mode === 'WIREFRAME') document.getElementById("lay-wire").classList.add("active");
            draw();
        }

        function clearActiveLayer() {
            for (let x = 0; x < gridCols; x++) {
                for (let y = 0; y < gridRows; y++) {
                    mapData[activeZ][x][y] = TileType.EMPTY;
                }
            }
            draw();
        }

        function randomizeGrid() {
            for (let z = 0; z < 4; z++) {
                for (let x = 0; x < gridCols; x++) {
                    for (let y = 0; y < gridRows; y++) {
                        const rand = Math.random();
                        if (rand < 0.4) {
                            mapData[z][x][y] = TileType.GRID_ROAD;
                        } else if (rand < 0.52) {
                            mapData[z][x][y] = TileType.WALL;
                        } else if (rand < 0.55) {
                            mapData[z][x][y] = TileType.BARREL;
                        } else if (rand < 0.57) {
                            mapData[z][x][y] = TileType.TERMINAL;
                        } else if (rand < 0.6) {
                            mapData[z][x][y] = TileType.LASER;
                        } else {
                            mapData[z][x][y] = TileType.EMPTY;
                        }
                    }
                }
            }
            draw();
        }

        // Draw functions
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw isometric grid lines / coordinates base helper
            drawBaseFloorGrid();

            // Draw multi-level map data layers
            for (let z = 0; z < 4; z++) {
                // If in isolated view, skip levels that aren't the active level
                if (viewMode === 'ISOLATED' && z !== activeZ) {
                    continue;
                }

                // Calculate opacity for translucency
                let alpha = 1.0;
                if (viewMode === 'ALL' && z !== activeZ) {
                    alpha = 0.25; // Translucent secondary layer
                }

                for (let x = 0; x < gridCols; x++) {
                    for (let y = 0; y < gridRows; y++) {
                        const tile = mapData[z][x][y];
                        if (tile !== TileType.EMPTY) {
                            drawIsometricElement(x, y, z, tile, alpha);
                        }

                        // Highlight hover grid cell
                        if (z === activeZ && x === hoverGrid.x && y === hoverGrid.y) {
                            drawTileOverlay(x, y, z, "rgba(0, 255, 204, 0.45)", "#00ffcc");
                        }
                    }
                }
            }

            // Draw Drone character
            drawDrone();
        }

        function drawBaseFloorGrid() {
            ctx.save();
            ctx.strokeStyle = "rgba(0, 255, 204, 0.08)";
            ctx.lineWidth = 1;

            for (let x = 0; x <= gridCols; x++) {
                const start = toIso(x, 0, 0);
                const end = toIso(x, gridRows, 0);
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }

            for (let y = 0; y <= gridRows; y++) {
                const start = toIso(0, y, 0);
                const end = toIso(gridCols, y, 0);
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawTileOverlay(x, y, z, fillCol, strokeCol) {
            const pos = toIso(x, y, z);
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y - tileHeight / 2);
            ctx.lineTo(pos.x + tileWidth / 2, pos.y);
            ctx.lineTo(pos.x, pos.y + tileHeight / 2);
            ctx.lineTo(pos.x - tileWidth / 2, pos.y);
            ctx.closePath();
            ctx.fillStyle = fillCol;
            ctx.fill();
            ctx.strokeStyle = strokeCol;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
        }

        function drawIsometricElement(x, y, z, tile, alpha) {
            const pos = toIso(x, y, z);

            ctx.save();
            ctx.globalAlpha = alpha;

            if (viewMode === 'WIREFRAME') {
                // Draw skeleton cage only
                drawWireframeCube(x, y, z, tile);
                ctx.restore();
                return;
            }

            switch(tile) {
                case TileType.GRID_ROAD:
                    // Cyber Road plate colors depending on elevation Z
                    let fill = "#112222";
                    let stroke = "rgba(0, 255, 204, 0.35)";
                    if (z === 1) { fill = "#1a1f29"; stroke = "rgba(220, 100, 255, 0.35)"; }
                    if (z === 2) { fill = "#2a1f2d"; stroke = "rgba(0, 150, 255, 0.45)"; }
                    if (z === 3) { fill = "#1f2922"; stroke = "rgba(0, 255, 100, 0.45)"; }

                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y - tileHeight / 2);
                    ctx.lineTo(pos.x + tileWidth / 2, pos.y);
                    ctx.lineTo(pos.x, pos.y + tileHeight / 2);
                    ctx.lineTo(pos.x - tileWidth / 2, pos.y);
                    ctx.closePath();
                    ctx.fillStyle = fill;
                    ctx.fill();
                    ctx.strokeStyle = stroke;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    break;

                case TileType.WALL:
                    // Render Extruded 3D Wall Box
                    const topYOffset = zHeightOffset * 1.2;
                    const topPos = { x: pos.x, y: pos.y - topYOffset };

                    // Colors
                    const leftCol = "#151b1f";
                    const rightCol = "#1b2329";
                    const topCol = "#242e36";
                    const highlight = "rgba(0, 255, 204, 0.45)";

                    // Left face
                    ctx.beginPath();
                    ctx.moveTo(pos.x - tileWidth / 2, pos.y);
                    ctx.lineTo(pos.x, pos.y + tileHeight / 2);
                    ctx.lineTo(topPos.x, topPos.y + tileHeight / 2);
                    ctx.lineTo(topPos.x - tileWidth / 2, topPos.y);
                    ctx.closePath();
                    ctx.fillStyle = leftCol;
                    ctx.fill();
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
                    ctx.stroke();

                    // Right face
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y + tileHeight / 2);
                    ctx.lineTo(pos.x + tileWidth / 2, pos.y);
                    ctx.lineTo(topPos.x + tileWidth / 2, topPos.y);
                    ctx.lineTo(topPos.x, topPos.y + tileHeight / 2);
                    ctx.closePath();
                    ctx.fillStyle = rightCol;
                    ctx.fill();
                    ctx.stroke();

                    // Top face
                    ctx.beginPath();
                    ctx.moveTo(topPos.x, topPos.y - tileHeight / 2);
                    ctx.lineTo(topPos.x + tileWidth / 2, topPos.y);
                    ctx.lineTo(topPos.x, topPos.y + tileHeight / 2);
                    ctx.lineTo(topPos.x - tileWidth / 2, topPos.y);
                    ctx.closePath();
                    ctx.fillStyle = topCol;
                    ctx.fill();
                    ctx.strokeStyle = highlight;
                    ctx.stroke();
                    break;

                case TileType.LASER:
                    // Render high hazard pulsing laser core emitter
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ff3366";

                    // Base pillar
                    ctx.fillStyle = "#221115";
                    ctx.strokeStyle = "#ff3366";
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Rising plasma laser ray beam line
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = "#ff3366";
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                    ctx.lineTo(pos.x, pos.y - 45);
                    ctx.stroke();

                    ctx.lineWidth = 1;
                    ctx.strokeStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                    ctx.lineTo(pos.x, pos.y - 45);
                    ctx.stroke();
                    break;

                case TileType.BARREL:
                    // Explosive drum cylinder
                    ctx.fillStyle = "#e07a1b";
                    ctx.strokeStyle = "#111111";
                    
                    // Barrel bottom ellipse
                    ctx.beginPath();
                    ctx.ellipse(pos.x, pos.y + 4, 8, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Core walls
                    ctx.beginPath();
                    ctx.moveTo(pos.x - 8, pos.y + 4);
                    ctx.lineTo(pos.x - 8, pos.y - 12);
                    ctx.lineTo(pos.x + 8, pos.y - 12);
                    ctx.lineTo(pos.x + 8, pos.y + 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Top orange cap
                    ctx.fillStyle = "#ffaa44";
                    ctx.beginPath();
                    ctx.ellipse(pos.x, pos.y - 12, 8, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    break;

                case TileType.TERMINAL:
                    // Command workstation terminal node
                    ctx.fillStyle = "#111111";
                    ctx.strokeStyle = "#00ffcc";

                    // Base stand
                    ctx.beginPath();
                    ctx.moveTo(pos.x - 4, pos.y);
                    ctx.lineTo(pos.x + 4, pos.y);
                    ctx.lineTo(pos.x + 2, pos.y - 12);
                    ctx.lineTo(pos.x - 2, pos.y - 12);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Floating glowing digital matrix screen panel
                    const pulse = Math.sin(Date.now() / 150) * 3;
                    const scY = pos.y - 20 + pulse;

                    ctx.fillStyle = "rgba(0, 255, 204, 0.15)";
                    ctx.beginPath();
                    ctx.moveTo(pos.x - 10, scY - 5);
                    ctx.lineTo(pos.x + 10, scY - 5);
                    ctx.lineTo(pos.x + 7, scY + 5);
                    ctx.lineTo(pos.x - 7, scY + 5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    break;
            }

            ctx.restore();
        }

        function drawWireframeCube(x, y, z, tile) {
            const pos = toIso(x, y, z);
            const topYOffset = zHeightOffset * (tile === TileType.WALL ? 1.2 : 0.2);
            const topPos = { x: pos.x, y: pos.y - topYOffset };

            ctx.save();
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 1;

            // Bottom Rhombus
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y - tileHeight/2);
            ctx.lineTo(pos.x + tileWidth/2, pos.y);
            ctx.lineTo(pos.x, pos.y + tileHeight/2);
            ctx.lineTo(pos.x - tileWidth/2, pos.y);
            ctx.closePath();
            ctx.stroke();

            // Top Rhombus
            ctx.beginPath();
            ctx.moveTo(topPos.x, topPos.y - tileHeight/2);
            ctx.lineTo(topPos.x + tileWidth/2, topPos.y);
            ctx.lineTo(topPos.x, topPos.y + tileHeight/2);
            ctx.lineTo(topPos.x - tileWidth/2, topPos.y);
            ctx.closePath();
            ctx.stroke();

            // Connecting Vertical Struts
            ctx.beginPath();
            ctx.moveTo(pos.x - tileWidth/2, pos.y);
            ctx.lineTo(topPos.x - tileWidth/2, topPos.y);

            ctx.moveTo(pos.x + tileWidth/2, pos.y);
            ctx.lineTo(topPos.x + tileWidth/2, topPos.y);

            ctx.moveTo(pos.x, pos.y - tileHeight/2);
            ctx.lineTo(topPos.x, topPos.y - tileHeight/2);

            ctx.moveTo(pos.x, pos.y + tileHeight/2);
            ctx.lineTo(topPos.x, topPos.y + tileHeight/2);
            ctx.stroke();

            ctx.restore();
        }

        // Draw Drone Player Avatar
        function drawDrone() {
            // Check matching active visual level
            if (viewMode === 'ISOLATED' && Math.floor(drone.z) !== activeZ) return;

            const pos = toIso(drone.x, drone.y, drone.z);
            const floatOffset = Math.sin(Date.now() / 200) * 5;
            const dy = pos.y - 12 + floatOffset;

            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#00ffff";

            // Glowing blue core engine disk
            ctx.fillStyle = "rgba(0, 255, 255, 0.4)";
            ctx.strokeStyle = "#00ffff";
            ctx.beginPath();
            ctx.ellipse(pos.x, dy, 12, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Top rotor casing pod
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(pos.x, dy - 5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Propeller blades line
            const angle = Date.now() / 40;
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "#8b949e";
            ctx.beginPath();
            ctx.moveTo(pos.x - Math.cos(angle) * 14, dy - 5 - Math.sin(angle) * 4);
            ctx.lineTo(pos.x + Math.cos(angle) * 14, dy - 5 + Math.sin(angle) * 4);
            ctx.stroke();

            // Shadow ring projected directly onto the isometric floor tile below the drone
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
            const floorPos = toIso(drone.x, drone.y, Math.floor(drone.z));
            ctx.beginPath();
            ctx.ellipse(floorPos.x, floorPos.y, 8, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Joystick Move Drone Handler
        function moveDrone(dx, dy) {
            const nextX = drone.x + dx * 0.5;
            const nextY = drone.y + dy * 0.5;

            // Bounds constraints
            if (nextX >= 0 && nextX <= gridCols && nextY >= 0 && nextY <= gridRows) {
                drone.x = nextX;
                drone.y = nextY;
            }
            draw();
        }

        // Support keyboard WASD controls
        window.addEventListener("keydown", (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': moveDrone(0, -1); break;
                case 's': moveDrone(0, 1); break;
                case 'a': moveDrone(-1, 0); break;
                case 'd': moveDrone(1, 0); break;
                case 'q': 
                    if (activeZ < 3) setZLevel(activeZ + 1);
                    break;
                case 'e':
                    if (activeZ > 0) setZLevel(activeZ - 1);
                    break;
            }
        });

        // Loop animation ticker
        setInterval(() => {
            draw();
        }, 1000 / 60);

        // Initial launch size setup
        setTimeout(() => {
            resizeCanvas();
        }, 100);
    </script>
</body>
</html>
